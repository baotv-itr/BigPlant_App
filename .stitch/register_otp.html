<body class="bg-background min-h-screen font-body-md text-on-background flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative Organic Background Elements -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
<div class="absolute -top-32 -left-32 w-96 h-96 bg-secondary-container opacity-20 rounded-full blur-3xl mix-blend-multiply"></div>
<div class="absolute top-1/2 -right-32 w-[500px] h-[500px] bg-primary-fixed opacity-10 rounded-full blur-3xl mix-blend-multiply"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-md z-10 px-container-margin py-section-gap flex flex-col h-full md:h-auto">
<!-- Header / Back -->
<header class="flex items-center mb-section-gap w-full">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-lowest hover:bg-surface-container-low text-on-surface transition-colors shadow-sm">
<span class="material-symbols-outlined" data-icon="arrow_back" style="font-variation-settings: 'wght' 400;">arrow_back</span>
</button>
</header>
<!-- Content Area inside a Card for depth -->
<div class="bg-surface-container-lowest rounded-[24px] p-container-margin shadow-[0px_4px_20px_rgba(15,82,56,0.04)] w-full flex flex-col relative overflow-hidden">
<!-- Subtle leaf motif hint in card -->
<div class="absolute top-0 right-0 w-32 h-32 bg-surface-tint opacity-5 rounded-bl-full pointer-events-none"></div>
<div class="text-center mb-8 relative z-10">
<div class="w-16 h-16 mx-auto bg-secondary-container/50 rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="mark_email_read" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mark_email_read</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">Xác thực Email</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Chúng tôi đã gửi mã OTP gồm 4 chữ số đến email<br/>
<span class="font-label-md text-label-md text-primary mt-1 inline-block">user@email.com</span>
</p>
</div>
<!-- OTP Input Form -->
<form class="flex flex-col gap-6 relative z-10">
<!-- OTP Fields -->
<div class="flex justify-between gap-3 md:gap-4 mb-2">
<input class="w-14 h-16 md:w-16 md:h-18 text-center font-headline-md text-headline-md text-primary bg-background border border-surface-dim rounded-lg focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all shadow-sm" maxlength="1" type="text" value="4"/>
<input class="w-14 h-16 md:w-16 md:h-18 text-center font-headline-md text-headline-md text-primary bg-background border border-surface-dim rounded-lg focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all shadow-sm" maxlength="1" type="text" value="8"/>
<input class="w-14 h-16 md:w-16 md:h-18 text-center font-headline-md text-headline-md text-primary bg-background border border-error rounded-lg focus:outline-none focus:border-error focus:ring-4 focus:ring-error/10 transition-all shadow-sm" maxlength="1" type="text" value="2"/>
<input class="w-14 h-16 md:w-16 md:h-18 text-center font-headline-md text-headline-md text-primary bg-background border border-surface-dim rounded-lg focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all shadow-sm" maxlength="1" placeholder="·" type="text"/>
</div>
<!-- Error Message (Active state example) -->
<div class="flex items-center justify-center gap-2 text-error font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px]" data-icon="error">error</span>
<span>Mã OTP không hợp lệ hoặc đã hết hạn.</span>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-lg shadow-[0_4px_14px_rgba(15,82,56,0.3)] hover:opacity-90 transition-opacity mt-2" type="button">
                    Xác thực
                </button>
<!-- Resend Action -->
<div class="text-center mt-4">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Chưa nhận được mã? 
                        <button class="font-label-md text-label-md text-primary hover:text-secondary transition-colors ml-1" type="button">
                            Gửi lại mã (00:45)
                        </button>
</p>
</div>
</form>
</div>
</main>
</body></html>
