<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col md:items-center md:justify-center">
<!-- Transactional Flow - Nav Shell Suppressed -->
<main class="flex-1 w-full max-w-[480px] flex flex-col px-container-margin py-section-gap relative bg-surface md:shadow-[0px_12px_32px_0px_rgba(15,82,56,0.08)] md:rounded-[24px] md:h-auto md:flex-none">

<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors text-on-surface">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
</div>
<!-- Header -->
<div class="mb-section-gap">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-2">Xác minh Reset Password</h1>
<p class="text-body-md font-body-md text-on-surface-variant">
                Vui lòng nhập mã 4 số đã được gửi đến email <br/>
<span class="font-semibold text-primary">hoanguyen@example.com</span>
</p>
</div>
<!-- OTP Input Area - Error State -->
<div class="flex flex-col gap-4 mb-section-gap">
<div class="flex justify-between items-center gap-2">
<!-- Input 1 -->
<input aria-label="OTP digit 1" class="w-16 h-16 md:w-20 md:h-20 text-center text-headline-md font-headline-md rounded-[16px] bg-error-container/30 border-2 border-error text-error focus:outline-none focus:ring-0 transition-colors shadow-sm" inputmode="numeric" maxlength="1" type="text" value="4"/>
<!-- Input 2 -->
<input aria-label="OTP digit 2" class="w-16 h-16 md:w-20 md:h-20 text-center text-headline-md font-headline-md rounded-[16px] bg-error-container/30 border-2 border-error text-error focus:outline-none focus:ring-0 transition-colors shadow-sm" inputmode="numeric" maxlength="1" type="text" value="2"/>
<!-- Input 3 -->
<input aria-label="OTP digit 3" class="w-16 h-16 md:w-20 md:h-20 text-center text-headline-md font-headline-md rounded-[16px] bg-error-container/30 border-2 border-error text-error focus:outline-none focus:ring-0 transition-colors shadow-sm" inputmode="numeric" maxlength="1" type="text" value="8"/>
<!-- Input 4 -->
<input aria-label="OTP digit 4" class="w-16 h-16 md:w-20 md:h-20 text-center text-headline-md font-headline-md rounded-[16px] bg-error-container/30 border-2 border-error text-error focus:outline-none focus:ring-0 transition-colors shadow-sm" inputmode="numeric" maxlength="1" type="text" value="9"/>
</div>

<div class="flex items-center gap-1.5 text-error mt-1">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">error</span>
<p class="text-label-sm font-label-sm">Mã OTP không chính xác. Vui lòng thử lại.</p>
</div>
</div>

<button class="w-full py-4 rounded-[16px] bg-primary text-on-primary text-label-md font-label-md shadow-[0px_4px_14px_0px_rgba(15,82,56,0.25)] hover:bg-primary/90 transition-all active:scale-[0.98]">
                Xác thực
            </button>
<div class="text-center">
<span class="text-body-md font-body-md text-on-surface-variant">Chưa nhận được mã? </span>
