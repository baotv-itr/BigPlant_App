<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FloraScan - Tạo tài khoản mới</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Playfair+Display:ital,wght@0,600;0,700;1,600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#3f6653",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#b1f0ce",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "primary": "#0f5238",
                    "outline-variant": "#bfc9c1",
                    "secondary-container": "#beead1",
                    "on-tertiary-fixed-variant": "#354c3b",
                    "on-background": "#191c1c",
                    "on-tertiary": "#ffffff",
                    "secondary-fixed": "#c1ecd4",
                    "surface-container-low": "#f2f4f3",
                    "inverse-surface": "#2e3131",
                    "on-secondary-container": "#436b58",
                    "on-primary-fixed": "#002114",
                    "inverse-on-surface": "#eff1f0",
                    "surface-bright": "#f8faf9",
                    "on-secondary-fixed": "#002114",
                    "surface-dim": "#d8dada",
                    "error": "#ba1a1a",
                    "surface": "#f8faf9",
                    "on-primary-container": "#a8e7c5",
                    "surface-container-highest": "#e1e3e2",
                    "tertiary": "#364d3c",
                    "tertiary-fixed": "#cee9d3",
                    "outline": "#707973",
                    "primary-fixed-dim": "#95d4b3",
                    "on-error": "#ffffff",
                    "on-primary-fixed-variant": "#0e5138",
                    "secondary-fixed-dim": "#a5d0b9",
                    "tertiary-container": "#4d6553",
                    "background": "#f8faf9",
                    "surface-variant": "#e1e3e2",
                    "on-tertiary-fixed": "#092012",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#b3cdb7",
                    "on-tertiary-container": "#c6e1ca",
                    "primary-container": "#2d6a4f",
                    "surface-container": "#eceeed",
                    "inverse-primary": "#95d4b3",
                    "on-secondary-fixed-variant": "#274e3d",
                    "surface-tint": "#2c694e",
                    "on-surface": "#191c1c",
                    "on-surface-variant": "#404943",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e6e9e8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-gap": "40px",
                    "base": "8px",
                    "container-margin": "24px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "label-md": [
                            "Be Vietnam Pro"
                    ],
                    "display-lg": [
                            "Playfair Display"
                    ],
                    "body-md": [
                            "Be Vietnam Pro"
                    ],
                    "headline-md": [
                            "Playfair Display"
                    ],
                    "headline-lg-mobile": [
                            "Playfair Display"
                    ],
                    "headline-lg": [
                            "Playfair Display"
                    ],
                    "body-lg": [
                            "Be Vietnam Pro"
                    ],
                    "label-sm": [
                            "Be Vietnam Pro"
                    ]
            },
            "fontSize": {
                    "label-md": [
                            "14px",
                            {
                                    "lineHeight": "20px",
                                    "letterSpacing": "0.01em",
                                    "fontWeight": "600"
                            }
                    ],
                    "display-lg": [
                            "48px",
                            {
                                    "lineHeight": "56px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "400"
                            }
                    ],
                    "headline-md": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "fontWeight": "600"
                            }
                    ],
                    "headline-lg-mobile": [
                            "28px",
                            {
                                    "lineHeight": "36px",
                                    "fontWeight": "700"
                            }
                    ],
                    "headline-lg": [
                            "32px",
                            {
                                    "lineHeight": "40px",
                                    "fontWeight": "700"
                            }
                    ],
                    "body-lg": [
                            "18px",
                            {
                                    "lineHeight": "28px",
                                    "fontWeight": "400"
                            }
                    ],
                    "label-sm": [
                            "12px",
                            {
                                    "lineHeight": "16px",
                                    "fontWeight": "500"
                            }
                    ]
            }
        },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased relative">
<!-- Abstract Leaf Background Motif -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none flex justify-center">
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-primary-fixed/20 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-5%] left-[-10%] w-[400px] h-[400px] bg-secondary-fixed/20 rounded-full blur-[100px]"></div>
</div>
<!-- Header (Transactional - No Global Nav) -->
<header class="relative z-10 flex items-center px-container-margin py-gutter w-full max-w-md mx-auto mt-4">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-lowest shadow-sm text-primary hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex-1 text-center pr-10">
<!-- Placeholder space to center title due to back button -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col px-container-margin pb-section-gap pt-4 w-full max-w-md mx-auto">
<div class="mb-8">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-2">Tạo tài khoản mới</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Bắt đầu hành trình khám phá thực vật cùng FloraScan.</p>
</div>
<form class="flex flex-col gap-5 w-full bg-surface-container-lowest p-6 rounded-2xl shadow-[0px_4px_20px_0px_rgba(15,82,56,0.04)]">
<!-- Username Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-primary" for="username">Username</label>
<div class="relative flex items-center w-full">
<span class="absolute left-4 material-symbols-outlined text-outline-variant" data-icon="person">person</span>
<input class="w-full bg-surface border border-outline-variant/30 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline-variant" id="username" placeholder="Nhập tên người dùng" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-primary" for="email">Email</label>
<div class="relative flex items-center w-full">
<span class="absolute left-4 material-symbols-outlined text-outline-variant" data-icon="mail">mail</span>
<input class="w-full bg-surface border border-error rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-error focus:ring-4 focus:ring-error/10 transition-all placeholder:text-outline-variant" id="email" placeholder="Nhập địa chỉ email" type="email" value="invalid-email-format"/>
<span class="absolute right-4 material-symbols-outlined text-error" data-icon="error">error</span>
</div>
<span class="font-label-sm text-label-sm text-error mt-1 ml-1">Email sai định dạng. Vui lòng kiểm tra lại.</span>
</div>
<!-- Phone Input (Optional) -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-primary flex items-center gap-2" for="phone">
                    Số điện thoại <span class="font-label-sm text-label-sm text-outline font-normal">(tùy chọn)</span>
</label>
<div class="relative flex items-center w-full">
<span class="absolute left-4 material-symbols-outlined text-outline-variant" data-icon="phone_iphone">phone_iphone</span>
<input class="w-full bg-surface border border-outline-variant/30 rounded-lg py-3 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline-variant" id="phone" placeholder="Nhập số điện thoại" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-primary" for="password">Password</label>
<div class="relative flex items-center w-full">
<span class="absolute left-4 material-symbols-outlined text-outline-variant" data-icon="lock">lock</span>
<input class="w-full bg-surface border border-error rounded-lg py-3 pl-12 pr-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-error focus:ring-4 focus:ring-error/10 transition-all placeholder:text-outline-variant" id="password" placeholder="Tạo mật khẩu" type="password" value="short"/>
<button aria-label="Toggle password visibility" class="absolute right-4 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<span class="font-label-sm text-label-sm text-error mt-1 ml-1">Mật khẩu phải dài ít nhất 8 ký tự.</span>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-primary" for="confirm_password">Nhập lại Password</label>
<div class="relative flex items-center w-full">
<span class="absolute left-4 material-symbols-outlined text-outline-variant" data-icon="lock">lock</span>
<input class="w-full bg-surface border border-outline-variant/30 rounded-lg py-3 pl-12 pr-12 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline-variant" id="confirm_password" placeholder="Nhập lại mật khẩu" type="password"/>
<button aria-label="Toggle confirm password visibility" class="absolute right-4 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Checkbox Terms -->
<div class="flex items-start gap-3 mt-2">
<div class="flex items-center h-5">
<input checked="" class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container-lowest bg-surface" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant text-sm" for="terms">
                    Đồng ý với <a class="text-primary font-medium hover:underline" href="#">điều khoản sử dụng</a> và <a class="text-primary font-medium hover:underline" href="#">chính sách bảo mật</a> của chúng tôi.
                </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-lg mt-4 shadow-[0px_4px_12px_rgba(15,82,56,0.2)] hover:bg-surface-tint hover:shadow-[0px_6px_16px_rgba(15,82,56,0.3)] transition-all flex justify-center items-center gap-2" type="submit">
                Đăng ký
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Login Link -->
<div class="text-center mt-4">
<span class="font-body-md text-body-md text-on-surface-variant text-sm">Đã có tài khoản?</span>
<a class="font-label-md text-label-md text-primary hover:text-secondary ml-1 transition-colors" href="#">Đăng nhập</a>
</div>
</form>
</main>
</body></html>
