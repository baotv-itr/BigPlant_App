<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased relative overflow-hidden">

<div class="absolute bottom-[-50px] left-[-50px] w-72 h-72 bg-secondary-container rounded-full blur-[60px] opacity-40 z-0"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col z-10 px-container-margin py-base md:px-0 md:justify-center md:items-center">
<!-- Top App Bar (Mobile Context) / Back Navigation (Desktop Context) -->
<header class="w-full flex items-center justify-between py-4 mb-8 md:max-w-md md:mb-12">
<button aria-label="Go back" class="flex items-center justify-center p-2 rounded-full hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-primary group-hover:text-secondary" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-primary absolute left-1/2 transform -translate-x-1/2 md:static md:translate-x-0">Quên mật khẩu</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Form Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-[24px] shadow-[0px_12px_32px_0px_rgba(15,82,56,0.08)] p-6 md:p-10 relative">
<div class="mb-8 text-center md:text-left">
<p class="font-body-lg text-body-lg text-on-surface-variant">
                    Nhập email của bạn để nhận mã OTP khôi phục mật khẩu.
                </p>
</div>
<form class="flex flex-col gap-6">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-primary" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="mail">mail</span>
<input class="w-full bg-surface-bright border border-soft-mint rounded-lg pl-12 pr-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="Ví dụ: name@example.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full bg-primary hover:bg-primary/90 text-on-primary font-label-md text-label-md py-4 px-6 rounded-[16px] shadow-[0px_4px_12px_0px_rgba(15,82,56,0.3)] hover:shadow-[0px_6px_16px_0px_rgba(15,82,56,0.4)] transition-all flex items-center justify-center gap-2" type="submit">
                    Tiếp tục
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Optional: Return to Login -->
<div class="mt-8 text-center">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center gap-1" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="keyboard_return">keyboard_return</span>
