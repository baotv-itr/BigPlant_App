<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>BigPlant - Tạo mật khẩu mới</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#3f6653",
                        "on-primary": "#ffffff",

                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary": "#0f5238",

                        "secondary-container": "#beead1",
                        "on-tertiary-fixed-variant": "#354c3b",
                        "on-background": "#191c1c",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#c1ecd4",
                        "surface-container-low": "#f2f4f3",
                        "inverse-surface": "#2e3131",
                        "on-secondary-container": "#436b58",
                        "on-primary-fixed": "#002114",
                        "inverse-on-surface": "#eff1f0",
                        "surface-bright": "#f8faf9",
                        "on-secondary-fixed": "#002114",
                        "surface-dim": "#d8dada",
                        "error": "#ba1a1a",
                        "surface": "#f8faf9",
                        "on-primary-container": "#a8e7c5",

                        "tertiary": "#364d3c",
                        "tertiary-fixed": "#cee9d3",
                        "outline": "#707973",
                        "primary-fixed-dim": "#95d4b3",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#0e5138",
                        "secondary-fixed-dim": "#a5d0b9",

                        "background": "#f8faf9",
                        "surface-variant": "#e1e3e2",
                        "on-tertiary-fixed": "#092012",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#b3cdb7",
                        "on-tertiary-container": "#c6e1ca",
                        "primary-container": "#2d6a4f",
                        "surface-container": "#eceeed",
                        "inverse-primary": "#95d4b3",
                        "on-secondary-fixed-variant": "#274e3d",
                        "surface-tint": "#2c694e",
                        "on-surface": "#191c1c",
                        "on-surface-variant": "#404943",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e6e9e8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "40px",
                        "base": "8px",
                        "container-margin": "24px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Be Vietnam Pro"],
                        "display-lg": ["Playfair Display"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Playfair Display"],

                    "fontSize": {

                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col relative overflow-x-hidden selection:bg-primary/20 selection:text-primary">
<!-- Ambient Background Element to mimic "Botanical Precision" airy feel -->
<div class="absolute top-0 right-0 w-[600px] h-[600px] bg-secondary-container/20 rounded-full blur-[120px] -z-10 pointer-events-none translate-x-1/3 -translate-y-1/3"></div>
<div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-primary-fixed/20 rounded-full blur-[100px] -z-10 pointer-events-none -translate-x-1/3 translate-y-1/3"></div>
<!-- Header (Transactional Intent: Navigation Suppressed, only Back Action) -->
<header class="w-full px-container-margin py-gutter flex items-center justify-between sticky top-0 z-10 bg-surface/80 backdrop-blur-md">
<button class="flex items-center justify-center w-10 h-10 rounded-full text-on-surface-variant hover:bg-surface-variant hover:text-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Optional right-side spacing element if needed to balance the header -->
<div class="w-10"></div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-container-margin pt-section-gap pb-container-margin max-w-lg mx-auto w-full">
<!-- Header Text -->
<div class="mb-section-gap">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile md:text-headline-lg md:font-headline-lg text-primary mb-base">
                Tạo mật khẩu mới
            </h1>
<p class="text-body-md font-body-md text-on-surface-variant">
                Vui lòng nhập mật khẩu mới và xác nhận lại để đảm bảo an toàn cho tài khoản của bạn.
            </p>
</div>
<!-- Password Form -->
<form action="#" class="flex flex-col flex-1" method="POST">
<!-- New Password Field -->
<div class="mb-gutter relative">
<label class="block text-label-md font-label-md text-primary mb-base" for="new_password">Mật khẩu mới</label>
<div class="relative group">
<input class="w-full bg-surface-bright border border-outline-variant rounded-xl px-4 py-4 text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all duration-300 pr-12" id="new_password" name="new_password" placeholder="Nhập mật khẩu mới" required="" type="password"/>
<button aria-label="Hiện/Ẩn mật khẩu" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary focus:outline-none focus:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Validation Hint -->
<div class="mt-2 flex items-start gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px] mt-0.5">info</span>
<p class="text-label-sm font-label-sm">Tối thiểu 8 ký tự, bao gồm chữ và số.</p>
</div>
</div>
<!-- Confirm Password Field -->
<div class="mb-section-gap relative">
<label class="block text-label-md font-label-md text-primary mb-base" for="confirm_password">Xác nhận mật khẩu mới</label>
<div class="relative group">
<input class="w-full bg-surface-bright border border-outline-variant rounded-xl px-4 py-4 text-body-md font-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all duration-300 pr-12" id="confirm_password" name="confirm_password" placeholder="Nhập lại mật khẩu mới" required="" type="password"/>
<button aria-label="Hiện/Ẩn mật khẩu" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary focus:outline-none focus:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Match Validation State (Hidden by default, shown structurally as an example) -->
<!-- 
                <div class="mt-2 flex items-center gap-2 text-error hidden">
                    <span class="material-symbols-outlined text-[16px]">error</span>
                    <p class="text-label-sm font-label-sm">Mật khẩu không khớp.</p>
                </div> 
                -->
</div>
<!-- Spacer to push button to bottom on smaller screens if needed -->
<div class="flex-1"></div>
<!-- Submit Action -->
<div class="pt-8">
<button class="w-full bg-primary text-on-primary text-label-md font-label-md py-4 px-6 rounded-[16px] hover:bg-primary/90 focus:ring-4 focus:ring-primary/20 transition-all duration-300 shadow-[0_4px_20px_0_rgba(15,82,56,0.2)] flex justify-center items-center gap-2 group" type="submit">
                    Lưu mật khẩu
                    <span class="material-symbols-outlined text-[20px] opacity-0 -ml-6 group-hover:opacity-100 group-hover:ml-0 transition-all duration-300">check</span>
</button>
</div>
</form>
</main>
</body></html>
